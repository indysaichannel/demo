name: Java CI/CD Pipeline

on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up JDK 17
        uses: actions/setup-java@v2
        with:
          java-version: '17'
          distribution: 'temurin'


      - name: Build with Maven
        run: mvn clean install

  deploy-dev:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Deploy to CloudHub Dev Environment
        env:
          ANYPOINT_USERNAME_DEV: ${{ secrets.ANYPOINT_USERNAME_DEV }}
          ANYPOINT_PASSWORD_DEV: ${{ secrets.ANYPOINT_PASSWORD_DEV }}
          APPNAME_DEV: ${{ secrets.APPNAME }}
        run: |
          echo "Deploying to CloudHub 2.0 Dev"

