name: MuleSoft CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up JDK 17
        uses: actions/setup-java@v2
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean install

      - name: Publish to Anypoint Exchange
        run: |
          mvn mule:deploy -DmuleDeploy -DskipDeployment=true \
            -Duser="${{ secrets.USER }}" \
            -Dpass="${{ secrets.PASS }}" \
            -DappName="${{ secrets.APPNAME }}"

  deploy-dev-cloudhub2:
    needs: build-and-publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up JDK 17
        uses: actions/setup-java@v2
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Deploy to CloudHub 2.0
        run: |
          mvn mule:deploy -DmuleDeploy \
            -Duser="${{ secrets.USER }}" \
            -Dpass="${{ secrets.PASS }}" \
            -DappName="${{ secrets.APPNAME }}"
